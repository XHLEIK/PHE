name: Deploy to Azure VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy to Production
    runs-on: ubuntu-latest
    
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      # ─────────────────────────────────────────────────────────────────
      # 1. Checkout code
      # ─────────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────────
      # 2. Setup Node.js with dependency caching
      # ─────────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ─────────────────────────────────────────────────────────────────
      # 3. Create .env.production from secret
      # ─────────────────────────────────────────────────────────────────
      - name: Create environment file
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          echo "$ENV_PRODUCTION" > .env.production
          echo "Created .env.production with $(wc -l < .env.production) lines"
          # Debug: show first few var names (not values)
          grep -oP '^[A-Z_]+=' .env.production | head -5 || echo "No vars found"

      # ─────────────────────────────────────────────────────────────────
      # 4. Install dependencies
      # ─────────────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ─────────────────────────────────────────────────────────────────
      # 5. Build Next.js (on GitHub's powerful runners - 7GB RAM)
      # ─────────────────────────────────────────────────────────────────
      - name: Build Next.js
        run: npm run build
        env:
          NODE_ENV: production

      # ─────────────────────────────────────────────────────────────────
      # 6. Create deployment package (only essential files)
      # ─────────────────────────────────────────────────────────────────
      - name: Create deployment package
        run: |
          tar -czf deploy.tar.gz \
            --exclude='.next/cache' \
            .next \
            public \
            package.json \
            package-lock.json \
            ecosystem.config.cjs \
            next.config.mjs \
            lib \
            requirements.txt \
            .env.production
          
          echo "📦 Deployment package created:"
          ls -lh deploy.tar.gz

      # ─────────────────────────────────────────────────────────────────
      # 7. Copy deployment package to Azure VM
      # ─────────────────────────────────────────────────────────────────
      - name: Copy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: 22
          source: "deploy.tar.gz"
          target: "~/PHE"
          overwrite: true

      # ─────────────────────────────────────────────────────────────────
      # 8. Deploy on server (extract + install deps + restart PM2)
      # ─────────────────────────────────────────────────────────────────
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            cd ~/PHE
            
            echo "=== Extracting deployment package ==="
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            
            echo "=== Creating logs directory ==="
            mkdir -p logs
            
            echo "=== Installing production dependencies ==="
            npm ci --omit=dev
            
            echo "=== Installing Python dependencies ==="
            pip install -r requirements.txt --quiet 2>/dev/null || pip3 install -r requirements.txt --quiet 2>/dev/null || echo "Python deps skipped"
            
            echo "=== Restarting PM2 processes ==="
            pm2 reload ecosystem.config.cjs --update-env 2>/dev/null || pm2 start ecosystem.config.cjs
            pm2 save
            
            echo "=== Deployment complete ==="
            pm2 list

      # ─────────────────────────────────────────────────────────────────
      # 9. Deployment status notifications
      # ─────────────────────────────────────────────────────────────────
      - name: Deployment successful
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "Commit: ${{ github.sha }}"
          echo "By: ${{ github.actor }}"
          echo "Time: $(date)"

      - name: Deployment failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Commit: ${{ github.sha }}"
          echo "Check logs above for details."
