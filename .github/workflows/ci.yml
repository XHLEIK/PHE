name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          # Provide dummy env vars for build (no runtime needed)
          MONGODB_URI: mongodb://localhost:27017/build-check
          JWT_ACCESS_SECRET: ci-build-access-secret-placeholder-64chars!!
          JWT_REFRESH_SECRET: ci-build-refresh-secret-placeholder-64chars!!
          RESEND_API_KEY: re_ci_placeholder
          UPSTASH_REDIS_REST_URL: https://fake.upstash.io
          UPSTASH_REDIS_REST_TOKEN: fake-token
          CLOUDINARY_CLOUD_NAME: ci-cloud
          CLOUDINARY_API_KEY: 000000000000000
          CLOUDINARY_API_SECRET: ci-secret
          GEMINI_API_KEY: ci-gemini-key
